# ============================================================================
# HSM — AES-128 crypto hardware security module register map
# ============================================================================
#
# Referenced by spec/devices.yaml via  spec: hsm.yaml
#
# Scope for the first Python model:
#   - Algorithms/modes: AES-128 ECB, CBC, CFB, CTR, and AES-128 CMAC.
#   - Key size: 128 bits only.
#   - Key source: KEY_ID 0..14 selects OTP file key slots; KEY_ID 15 selects
#     the open write-only KEY_WORD registers.
#   - DMA model: HSM behaves as a DMA client and reuses the existing DMA
#     controller path. The HSM internally reads SRC_ADDR, runs crypto, then
#     writes the generated output directly to DST_ADDR. No input/output FIFO is
#     exposed in the CPU-visible register map.
#   - Memory access: input may live in QEMU FLASH or SRAM. Output is expected
#     to target writable memory such as SRAM. If firmware programs DST_ADDR in
#     read-only FLASH, the DMA/memory backend should report a bus/write error
#     and HSM should latch STATUS.ERROR / ERROR.DST_BUS_ERROR.
#   - Access policy: every HSM register is accessible only by master_id == 0
#     (CPU0). Other masters read zero and writes are ignored. Such illegal
#     access latches STATUS.ACCESS_ERR and ERROR.ACCESS_DENIED; the sticky
#     illegal-access state is cleared only by HSM module reset. Per-device reset
#     control is not modeled in this spec yet; a future CRU model should manage
#     device clock/reset.
#
# Model configuration (consumed by the future Python HSM model, not by the
# generic code generator):
#   otp_file: path to a JSON file that simulates OTP key storage.
#   otp_format example:
#     {
#       "slots": {
#         "0":  {"aes128": "00112233445566778899AABBCCDDEEFF"},
#         "14": {"aes128": "000102030405060708090A0B0C0D0E0F"}
#       }
#     }
#
# Typical operation sequence:
#   1. Firmware writes KEY_ID.
#      - 0..14: key is loaded from OTP slot with matching id.
#      - 15: firmware writes KEY_WORD0..3 before START.
#   2. Firmware writes MODE, IV_WORD0..3 if the selected mode needs IV/counter,
#      SRC_ADDR, DST_ADDR, and LENGTH.
#   3. Firmware writes CTRL.START.
#   4. HSM requests DMA/client memory read from SRC_ADDR.
#   5. HSM runs AES/CMAC over the internal input buffer.
#   6. HSM requests DMA/client memory write of the internal output buffer to
#      DST_ADDR, sets STATUS.DONE, and optionally raises IRQ.
#
# Length rules:
#   - ECB/CBC encrypt/decrypt: LENGTH must be a non-zero multiple of 16 bytes.
#   - CFB/CTR encrypt/decrypt: LENGTH may be any non-zero byte length.
#   - CMAC: LENGTH may be any non-zero byte length; output is a 16-byte tag.
#   - For CMAC, DST_ADDR receives the 16-byte tag and TAG_WORD0..3 mirror it.

model:
  otp_file: "build/hsm_otp.json"
  otp_key_size_bits: 128
  key_id_otp_range: [0, 14]
  key_id_register: 15
  allowed_register_master_id: 0
  dma_client: true
  algorithms:
    - AES-128-ECB-ENCRYPT
    - AES-128-ECB-DECRYPT
    - AES-128-CBC-ENCRYPT
    - AES-128-CBC-DECRYPT
    - AES-128-CFB-ENCRYPT
    - AES-128-CFB-DECRYPT
    - AES-128-CTR-CRYPT
    - AES-128-CMAC

registers:
  - offset:      0x00
    name:        ID
    access:      R
    description: "Device ID: ASCII 'HSM1' encoded little-endian"
    reset_value: 0x314D5348

  - offset:      0x04
    name:        VERSION
    access:      R
    description: "Model version: major.minor encoded as 0x00010000 for v1.0"
    reset_value: 0x00010000

  - offset:      0x08
    name:        CTRL
    access:      RW
    description: >
      Control register.
      bit0 = START (write 1 to start operation, self-clears);
      bit1 = IRQ_ENABLE;
      other bits reserved. Device reset is intentionally not exposed here;
      future CRU support should manage HSM reset/clock.
    reset_value: 0x00000000

  - offset:      0x0C
    name:        STATUS
    access:      R
    description: >
      Status register.
      bit0 = BUSY;
      bit1 = DONE;
      bit2 = ERROR;
      bit3 = IRQ_PENDING;
      bit4 = KEY_VALID;
      bit5 = OTP_KEY_LOADED;
      bit6 = ACCESS_ERR (sticky illegal master access; cleared only by HSM reset).
    reset_value: 0x00000000

  - offset:      0x10
    name:        INT_STATUS
    access:      RW
    description: >
      Interrupt/status latch, W1C in the Python model.
      bit0 = DONE_IRQ;
      bit1 = ERROR_IRQ;
      bit2 = ACCESS_ERR_IRQ. Clearing ACCESS_ERR_IRQ does not clear
      STATUS.ACCESS_ERR; that sticky state requires HSM reset.
    reset_value: 0x00000000

  - offset:      0x14
    name:        INT_ENABLE
    access:      RW
    description: >
      Interrupt enable mask.
      bit0 enables DONE interrupt;
      bit1 enables ERROR interrupt;
      bit2 enables ACCESS_ERR interrupt.
    reset_value: 0x00000000

  - offset:      0x18
    name:        ERROR
    access:      R
    description: >
      Last error code.
      0=NONE;
      1=ACCESS_DENIED;
      2=INVALID_MODE;
      3=INVALID_LENGTH;
      4=KEY_NOT_VALID;
      5=OTP_FILE_ERROR;
      6=OTP_SLOT_INVALID;
      7=DMA_READ_ERROR;
      8=DMA_WRITE_ERROR;
      9=DST_BUS_ERROR.
    reset_value: 0x00000000

  - offset:      0x1C
    name:        MODE
    access:      RW
    description: >
      Crypto mode selection.
      bits[3:0] = MODE: 0=AES_ECB, 1=AES_CBC, 2=AES_CFB, 3=AES_CTR, 4=AES_CMAC;
      bit8 = DECRYPT (0=encrypt/compute, 1=decrypt; ignored for CMAC and CTR).
    reset_value: 0x00000000

  - offset:      0x20
    name:        SRC_ADDR
    access:      RW
    description: "Source physical address for DMA input buffer (FLASH or SRAM)"
    reset_value: 0x00000000

  - offset:      0x24
    name:        DST_ADDR
    access:      RW
    description: >
      Destination physical address for DMA output buffer/tag.
      Expected to point to writable memory such as SRAM; writes to read-only
      FLASH should surface as a DMA/memory bus error.
    reset_value: 0x00000000

  - offset:      0x28
    name:        LENGTH
    access:      RW
    description: >
      Input length in bytes.
      ECB/CBC require a non-zero multiple of 16.
      CFB/CTR/CMAC accept any non-zero byte length.
      CMAC produces a 16-byte output tag regardless of input length.
    reset_value: 0x00000000

  - offset:      0x2C
    name:        DMA_STATUS
    access:      R
    description: >
      DMA/client phase status.
      bit0 = DMA_READ_BUSY;
      bit1 = DMA_READ_DONE;
      bit2 = DMA_WRITE_BUSY;
      bit3 = DMA_WRITE_DONE;
      bit4 = DMA_ERROR.
    reset_value: 0x00000000

  - offset:      0x30
    name:        KEY_ID
    access:      RW
    description: >
      Active key selector.
      values 0..14 select OTP key slots 0..14;
      value 15 selects the open KEY_WORD0..3 register key.
      Other values are invalid and should latch ERROR.OTP_SLOT_INVALID.
    reset_value: 0x00000000

  - offset:      0x34
    name:        KEY_STATUS
    access:      R
    description: >
      Key status.
      bit0 = REG_KEY_WRITTEN;
      bit1 = OTP_KEY_AVAILABLE;
      bit2 = ACTIVE_KEY_VALID;
      bits[15:8] = active KEY_ID.
    reset_value: 0x00000000

  - offset:      0x38
    name:        KEY_WORD0
    access:      W
    description: "Open key register word 0, bits [31:0] of AES-128 key; CPU reads return 0"
    reset_value: 0x00000000

  - offset:      0x3C
    name:        KEY_WORD1
    access:      W
    description: "Open key register word 1, bits [63:32] of AES-128 key; CPU reads return 0"
    reset_value: 0x00000000

  - offset:      0x40
    name:        KEY_WORD2
    access:      W
    description: "Open key register word 2, bits [95:64] of AES-128 key; CPU reads return 0"
    reset_value: 0x00000000

  - offset:      0x44
    name:        KEY_WORD3
    access:      W
    description: "Open key register word 3, bits [127:96] of AES-128 key; CPU reads return 0"
    reset_value: 0x00000000

  - offset:      0x50
    name:        IV_WORD0
    access:      RW
    description: "IV/counter word 0, bits [31:0], used by CBC/CFB/CTR"
    reset_value: 0x00000000

  - offset:      0x54
    name:        IV_WORD1
    access:      RW
    description: "IV/counter word 1, bits [63:32], used by CBC/CFB/CTR"
    reset_value: 0x00000000

  - offset:      0x58
    name:        IV_WORD2
    access:      RW
    description: "IV/counter word 2, bits [95:64], used by CBC/CFB/CTR"
    reset_value: 0x00000000

  - offset:      0x5C
    name:        IV_WORD3
    access:      RW
    description: "IV/counter word 3, bits [127:96], used by CBC/CFB/CTR"
    reset_value: 0x00000000

  - offset:      0x60
    name:        TAG_WORD0
    access:      R
    description: "CMAC tag/result word 0, bits [31:0]"
    reset_value: 0x00000000

  - offset:      0x64
    name:        TAG_WORD1
    access:      R
    description: "CMAC tag/result word 1, bits [63:32]"
    reset_value: 0x00000000

  - offset:      0x68
    name:        TAG_WORD2
    access:      R
    description: "CMAC tag/result word 2, bits [95:64]"
    reset_value: 0x00000000

  - offset:      0x6C
    name:        TAG_WORD3
    access:      R
    description: "CMAC tag/result word 3, bits [127:96]"
    reset_value: 0x00000000
