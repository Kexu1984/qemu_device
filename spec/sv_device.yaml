# SystemVerilog-backed APB timer prototype.
#
# Register contract exposed to firmware through mmio-sockdev:
#   0x000..0x0ff: APB timer
#   CTRL       bit0=ENABLE, bit1=IRQ_EN
#   LOAD       countdown cycles loaded when ENABLE is written
#   VALUE      current countdown value
#   STATUS     bit0=IRQ_PENDING
#   IRQ_CLEAR  W1C bit0 clears IRQ_PENDING and deasserts IRQ
#   0x100..0x1ff: SV DMA prototype
#   DMA_CTRL   bit0=START, bit1=IRQ_EN
#   DMA_STATUS bit0=BUSY, bit1=DONE, bit2=ERROR
#   0x200..0x2ff: SV GPIO prototype
#   GPIO_ID        ASCII 'GPIO' little-endian
#   GPIO_DATA_OUT  output data shadow
#   GPIO_DATA_IN   sampled pin value; output pins loop DATA_OUT back
#   GPIO_DIR       bit=1 output, bit=0 input
#   GPIO_SET/CLR/TOGGLE write-one data modifiers
#   GPIO_IRQ_EN    bit mask for data-change IRQ generation
#   GPIO_IRQ_STATUS W1C pending data-change bits
#   GPIO_INPUT_SIM simulation input shadow for input pins

registers:
  - offset:      0x00
    name:        ctrl
    access:      RW
    description: "Control: bit0=ENABLE, bit1=IRQ_EN"

  - offset:      0x04
    name:        load
    access:      RW
    description: "Countdown load value in SV clock cycles"

  - offset:      0x08
    name:        value
    access:      R
    description: "Current countdown value"

  - offset:      0x0C
    name:        status
    access:      R
    description: "Status: bit0=IRQ_PENDING"

  - offset:      0x10
    name:        irq_clear
    access:      W
    description: "Write bit0=1 to clear IRQ_PENDING and deassert IRQ"

  - offset:      0x100
    name:        dma_id
    access:      R
    reset:       0x414D4453
    description: "SV DMA ID: ASCII 'SDMA' little-endian"

  - offset:      0x104
    name:        dma_ctrl
    access:      RW
    description: "SV DMA control: bit0=START, bit1=IRQ_EN"

  - offset:      0x108
    name:        dma_status
    access:      R
    description: "SV DMA status: bit0=BUSY, bit1=DONE, bit2=ERROR"

  - offset:      0x10C
    name:        dma_src_addr
    access:      RW
    description: "SV DMA source physical address; first prototype requires 32-bit alignment"

  - offset:      0x110
    name:        dma_dst_addr
    access:      RW
    description: "SV DMA destination physical address; first prototype requires 32-bit alignment"

  - offset:      0x114
    name:        dma_length
    access:      RW
    description: "SV DMA transfer length in bytes; first prototype requires a non-zero multiple of 4"

  - offset:      0x118
    name:        dma_error
    access:      R
    description: "SV DMA error: 0=NONE, 1=BAD_CONFIG, 2=AHB_READ_ERROR, 3=AHB_WRITE_ERROR"

  - offset:      0x11C
    name:        dma_irq_clear
    access:      W
    description: "Write bit0=1 to clear SV DMA DONE/ERROR IRQ and return DMA FSM to idle"

  - offset:      0x120
    name:        dma_count
    access:      R
    description: "Number of bytes completed by the SV DMA engine"

  - offset:      0x200
    name:        gpio_id
    access:      R
    reset:       0x4F495047
    description: "SV GPIO ID: ASCII 'GPIO' little-endian"

  - offset:      0x204
    name:        gpio_data_out
    access:      RW
    description: "GPIO output data shadow"

  - offset:      0x208
    name:        gpio_data_in
    access:      R
    description: "GPIO sampled input data; output pins read back DATA_OUT"

  - offset:      0x20C
    name:        gpio_dir
    access:      RW
    description: "GPIO direction bitmap: bit=1 output, bit=0 input"

  - offset:      0x210
    name:        gpio_set
    access:      W
    description: "Write-one set bits in GPIO_DATA_OUT"

  - offset:      0x214
    name:        gpio_clr
    access:      W
    description: "Write-one clear bits in GPIO_DATA_OUT"

  - offset:      0x218
    name:        gpio_toggle
    access:      W
    description: "Write-one toggle bits in GPIO_DATA_OUT"

  - offset:      0x21C
    name:        gpio_irq_en
    access:      RW
    description: "GPIO data-change IRQ enable bitmap"

  - offset:      0x220
    name:        gpio_irq_status
    access:      RW
    description: "GPIO data-change IRQ pending bitmap; write-one clears bits"

  - offset:      0x224
    name:        gpio_input_sim
    access:      RW
    description: "Simulation input value for pins configured as inputs"